backend:
  name: github
  repo: carlwillandt/carl-willandt-www
  branch: main

logo_url: /carl-willandt-logo-small.svg

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blogi
    label: "Blogi"
    label_singular: "Blogipostaus"
    folder: src/content/blogi
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Otsikko", name: title, widget: string }
      - { label: "Päivämäärä", name: date, widget: datetime }
      - { label: "Kategoria", name: category, widget: string,
          hint: "Vapaa teksti, esim. 'Talous & kasvu', 'Turvallisuus', 'Koulutus'" }
      - { label: "Tiivistelmä", name: excerpt, widget: text,
          hint: "Lyhyt kuvaus, näkyy blogikorteissa ja hakukoneille" }
      - { label: "Luonnos (ei julkinen)", name: draft, widget: boolean, default: false }
      - { label: "Sisältö", name: body, widget: markdown }

  - name: medialle
    label: "Medialle"
    label_singular: "Lehdistötiedote"
    folder: src/content/medialle
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Otsikko", name: title, widget: string }
      - { label: "Päivämäärä", name: date, widget: datetime }
      - { label: "Tiivistelmä", name: excerpt, widget: text }
      - { label: "Luonnos", name: draft, widget: boolean, default: false }
      - { label: "Sisältö", name: body, widget: markdown }

  - name: asetukset
    label: "Sivuston asetukset"
    files:
      - label: "Etusivu"
        name: etusivu
        file: src/content/settings/site.json
        fields:
          - { label: "Hero-otsikko (lihavoitu rivi, esim. SIVISTYSTÄ,)", name: heroTextBold, widget: string }
          - { label: "Hero-otsikko (kevyt rivi, esim. realismia ja rohkeutta)", name: heroTextRegular, widget: string }
          - { label: "Hero-leipäteksti", name: heroBodyText, widget: text }
          - { label: "Ilmoitusbannerin teksti (tyhjä = piilotettu)",
              name: announcementBannerText, widget: string, required: false }
          - { label: "Banneri: linkki-teksti", name: announcementBannerLinkLabel,
              widget: string, required: false }
          - { label: "Banneri: linkki-URL", name: announcementBannerLinkHref,
              widget: string, required: false }
          - { label: "Video-URL (YouTube embed, esim. https://www.youtube.com/embed/xyz)",
              name: videoUrl, widget: string, required: false }
          - { label: "Video-osion teksti (HTML)", name: videoBodyText,
              widget: markdown, required: false }
          - { label: "X / Twitter -profiili URL", name: socialX, widget: string }
          - { label: "Instagram-profiili URL", name: socialInstagram, widget: string }
          - { label: "Facebook-profiili URL", name: socialFacebook, widget: string }

      - label: "Carl-sivu"
        name: carl
        file: src/content/settings/carl.json
        fields:
          - { label: "Hero-otsikko", name: heroTitleBold, widget: string }
          - { label: "Johdantokappale", name: introParagraph, widget: text }
          - { label: "Osion otsikko", name: sectionTitle, widget: string }
          - label: "Accordion-osiot"
            name: accordionItems
            widget: list
            fields:
              - { label: "Tunniste (älä muuta)", name: id, widget: string }
              - { label: "Otsikko", name: title, widget: string }
              - label: "Ikoni"
                name: icon
                widget: select
                options:
                  - { label: "Koti", value: home }
                  - { label: "Kirja", value: book-open }
                  - { label: "Trophy", value: trophy }
                  - { label: "Puu", value: tree-pine }
                  - { label: "Kilpi", value: shield }
                  - { label: "Lakki", value: graduation-cap }
                  - { label: "Vaaka", value: scale }
              - { label: "Sisältö", name: content, widget: markdown }

      - label: "Tavoitteeni-sivu"
        name: tavoitteeni
        file: src/content/settings/tavoitteeni.json
        fields:
          - { label: "Hero-otsikko", name: heroTitleBold, widget: string }
          - { label: "Johdantokappale", name: introParagraph, widget: text }
          - label: "Accordion-osiot"
            name: accordionItems
            widget: list
            fields:
              - { label: "Tunniste (älä muuta)", name: id, widget: string }
              - { label: "Otsikko", name: title, widget: string }
              - label: "Ikoni"
                name: icon
                widget: select
                options:
                  - { label: "Koti", value: home }
                  - { label: "Kirja", value: book-open }
                  - { label: "Trophy", value: trophy }
                  - { label: "Puu", value: tree-pine }
                  - { label: "Kilpi", value: shield }
                  - { label: "Lakki", value: graduation-cap }
                  - { label: "Vaaka", value: scale }
              - { label: "Sisältö", name: content, widget: markdown }

      - label: "Yhteystiedot-sivu"
        name: ota-yhteytta
        file: src/content/settings/ota-yhteytta.json
        fields:
          - { label: "Sähköpostiosoite", name: email, widget: string }
          - { label: "Lisäteksti (vapaaehtoinen)", name: introText, widget: text, required: false }

      - label: "Tukijoukot-sivu"
        name: vapaaehtoiseksi
        file: src/content/settings/vapaaehtoiseksi.json
        fields:
          - { label: "Osion otsikko", name: introTitle, widget: string }
          - { label: "Ensimmäinen kappale", name: introParagraph1, widget: text }
          - { label: "Toinen kappale", name: introParagraph2, widget: text }
